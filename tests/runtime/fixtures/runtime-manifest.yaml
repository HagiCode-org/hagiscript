runtime:
  name: "fixture-runtime"
  version: "1.0.0"

paths:
  runtimeRoot: "~/.hagicode/runtime-fixture"
  runtimeHome: "program"
  runtimeDataRoot: "runtime-data"
  bin: "bin"
  config: "config"
  logs: "logs"
  data: "data"
  stateFile: "state.json"
  componentsRoot: "components"
  componentDataRoot: "components"
  defaultPm2Home: "pm2"
  npmPrefix: "npm"
  nodeRuntime: "components/node"
  dotnetRuntime: "components/dotnet"
  vendoredRoot: "components/services"

components:
  - name: "alpha"
    type: "bundled-runtime"
    runtimeDataDir: "alpha-data"
    installScript: "scripts/install-component.mjs"
    verifyScript: "scripts/verify-component.mjs"
    version: "1.0.0"

  - name: "beta"
    type: "bundled-runtime"
    runtimeDataDir: "beta-data"
    installScript: "scripts/install-component.mjs"
    verifyScript: "scripts/verify-component.mjs"
    version: "1.0.0"

phases:
  install:
    order: ["alpha", "beta"]
  remove:
    order: ["beta", "alpha"]
  update:
    order: ["alpha", "beta"]
