runtime:
  name: "hagicode-runtime"
  version: "1.0.0"
  hagicodeInstance: "hagicode"

paths:
  runtimeRoot: "~/.hagicode/runtime"
  runtimeHome: "program"
  runtimeDataRoot: "runtime-data"
  serverProgramRoot: "server"
  serverDataRoot: "server-data"
  bin: "bin"
  config: "config"
  logs: "logs"
  data: "data"
  stateFile: "state.json"
  componentsRoot: "components"
  componentDataRoot: "components"
  defaultPm2Home: "pm2"
  npmPrefix: "npm"
  nodeRuntime: "components/node/runtime"
  dotnetRuntime: "components/dotnet/runtime"
  vendoredRoot: "components/bundled"

components:
- name: "node"
  type: "runtime"
  source: "desktop-bundled-node"
  version: "22.22.2"
  channelVersion: "22"

- name: "dotnet"
  type: "runtime"
  source: "desktop-embedded-dotnet"
  version: "10.0.5"
  channelVersion: "10.0"

- name: "omniroute"
  type: "bundled-runtime"
  source: "desktop-vendored-runtime"
  version: "3.6.9"
  runtimeDataDir: "services/omniroute"
  lifecycleDependencies:
  - "node"
  pm2:
    appName: "hagicode-omniroute"
    cwd: "current"

- name: "code-server"
  type: "bundled-runtime"
  source: "desktop-vendored-runtime"
  version: "4.117.0"
  runtimeDataDir: "services/code-server"
  lifecycleDependencies:
  - "node"
  pm2:
    appName: "hagicode-code-server"
    cwd: "current"

- name: "server"
  type: "released-service"
  source: "hagicode-release-package"
  runtimeDataDir: "services/server"
  lifecycleDependencies:
  - "node"
  - "dotnet"
  pm2:
    appName: "hagicode-server"
    env:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://127.0.0.1:39150"
  releasedService:
    dllPath: "lib/PCode.Web.dll"
    workingDirectory: "lib"
    configRoot: "lib"
    runtimeFilesDir: "pm2-runtime"
    startScript: "start.sh"

phases:
  install:
    order:
    - "node"
    - "dotnet"
    - "server"
    - "omniroute"
    - "code-server"
  remove:
    order:
    - "server"
    - "code-server"
    - "omniroute"
    - "dotnet"
    - "node"
  update:
    order:
    - "node"
    - "dotnet"
    - "server"
    - "omniroute"
    - "code-server"

npmSync:
  packages:
    "pm2":
      version: "7.0.1"
      target: "7.0.1"
    "@anthropic-ai/claude-code":
      version: "2.1.119"
      target: "2.1.119"
    "@fission-ai/openspec":
      version: "1.3.1"
      target: "1.3.1"
    "@openai/codex":
      version: "0.125.0"
      target: "0.125.0"
    "skills":
      version: "1.5.1"
      target: "1.5.1"
