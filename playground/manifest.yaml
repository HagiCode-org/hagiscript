runtime:
  name: "hagicode-runtime-playground"
  version: "1.0.0"
  hagicodeInstance: "hagiscript_playground"

paths:
  runtimeRoot: "./playground/runtime-root"
  runtimeHome: "program"
  runtimeDataRoot: "runtime-data"
  serverProgramRoot: "server"
  serverDataRoot: "server-data"
  bin: "bin"
  config: "config"
  logs: "logs"
  data: "data"
  stateFile: "state.json"
  componentsRoot: "components"
  componentDataRoot: "components"
  defaultPm2Home: "pm2"
  npmPrefix: "npm"
  nodeRuntime: "components/node/runtime"
  dotnetRuntime: "components/dotnet/runtime"
  vendoredRoot: "components/bundled"

components:
- name: "node"
  type: "runtime"
  source: "desktop-bundled-node"
  version: "22.22.2"
  channelVersion: "22"
  installScript: "../runtime/scripts/install-node.mjs"
  verifyScript: "../runtime/scripts/verify-node.mjs"

- name: "dotnet"
  type: "runtime"
  source: "desktop-embedded-dotnet"
  version: "10.0.5"
  channelVersion: "10.0"
  installScript: "../runtime/scripts/install-dotnet.mjs"
  verifyScript: "../runtime/scripts/verify-dotnet.mjs"
  removeScript: "../runtime/scripts/remove-dotnet.mjs"

- name: "pm2"
  type: "package"
  source: "runtime-managed-package"
  version: "7.0.1"
  lifecycleDependencies:
  - "node"
  installScript: "../runtime/scripts/install-pm2.mjs"
  removeScript: "../runtime/scripts/remove-pm2.mjs"

- name: "omniroute"
  type: "bundled-runtime"
  source: "desktop-vendored-runtime"
  version: "3.6.9"
  runtimeDataDir: "services/omniroute"
  lifecycleDependencies:
  - "node"
  - "pm2"
  installScript: "../runtime/scripts/install-omniroute.mjs"
  configureScript: "../runtime/scripts/configure-omniroute.mjs"
  pm2:
    appName: "hagicode-omniroute"
    cwd: "."
    script: "current/omniroute-launcher.mjs"

- name: "code-server"
  type: "bundled-runtime"
  source: "desktop-vendored-runtime"
  version: "4.117.0"
  runtimeDataDir: "services/code-server"
  lifecycleDependencies:
  - "node"
  - "pm2"
  installScript: "../runtime/scripts/install-code-server.mjs"
  configureScript: "../runtime/scripts/configure-code-server.mjs"
  pm2:
    appName: "hagicode-code-server"
    cwd: "."
    script: "current/code-server-launcher.mjs"

- name: "server"
  type: "released-service"
  source: "hagicode-release-package"
  runtimeDataDir: "services/server"
  lifecycleDependencies:
  - "node"
  - "dotnet"
  - "pm2"
  installScript: "../runtime/scripts/install-server.mjs"
  configureScript: "../runtime/scripts/configure-server.mjs"
  removeScript: "../runtime/scripts/remove-server.mjs"
  pm2:
    appName: "hagicode-server"
    env:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://127.0.0.1:39151"
  releasedService:
    dllPath: "lib/PCode.Web.dll"
    workingDirectory: "lib"
    configRoot: "lib"
    runtimeFilesDir: "pm2-runtime"
    startScript: "start.sh"

phases:
  install:
    order:
    - "node"
    - "dotnet"
    - "pm2"
    - "server"
    - "omniroute"
    - "code-server"
  remove:
    order:
    - "server"
    - "code-server"
    - "omniroute"
    - "pm2"
    - "dotnet"
    - "node"
  update:
    order:
    - "node"
    - "dotnet"
    - "pm2"
    - "server"
    - "omniroute"
    - "code-server"
