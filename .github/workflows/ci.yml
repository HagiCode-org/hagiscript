name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  HAGISCRIPT_CI_ARTIFACT_DIR: .ci-artifacts

jobs:
  validate:
    name: Validate (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            platform: linux
          - os: windows-latest
            label: Windows
            platform: windows
          - os: macos-latest
            label: macOS
            platform: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Prepare CI artifact directory
        shell: bash
        run: mkdir -p "$HAGISCRIPT_CI_ARTIFACT_DIR"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node scripts/run-with-log.mjs "${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/validate-${{ matrix.platform }}-test.log" npm test

      - name: Build package
        run: node scripts/run-with-log.mjs "${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/validate-${{ matrix.platform }}-build.log" npm run build

      - name: Verify packed files
        run: node scripts/run-with-log.mjs "${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/validate-${{ matrix.platform }}-pack-check.log" npm run pack:check

      - name: Run installed package runtime integration test
        env:
          HAGISCRIPT_INTEGRATION_SUMMARY_PATH: ${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/validate-${{ matrix.platform }}-integration-summary.md
        run: node scripts/run-with-log.mjs "${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/validate-${{ matrix.platform }}-integration.log" npm run integration:installed-runtime

      - name: Append validation summary
        if: always()
        shell: bash
        run: |
          echo "## Hagiscript validate (${{ matrix.label }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${HAGISCRIPT_CI_ARTIFACT_DIR}/validate-${{ matrix.platform }}-integration-summary.md" ]; then
            cat "${HAGISCRIPT_CI_ARTIFACT_DIR}/validate-${{ matrix.platform }}-integration-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Integration summary was not produced before the job ended." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hagiscript-validate-${{ matrix.platform }}-diagnostics
          path: ${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/
          if-no-files-found: warn

  runtime-management:
    name: Runtime management (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            platform: linux
          - os: windows-latest
            label: Windows
            platform: windows
          - os: macos-latest
            label: macOS
            platform: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for HagiScript build
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Prepare CI artifact directory
        shell: bash
        run: mkdir -p "$HAGISCRIPT_CI_ARTIFACT_DIR"

      - name: Prepare HagiScript package
        run: node scripts/run-with-log.mjs "${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/runtime-management-${{ matrix.platform }}-prepare.log" npm ci && node scripts/run-with-log.mjs "${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/runtime-management-${{ matrix.platform }}-build.log" npm run build

      - name: Run installed HagiScript runtime integration test
        env:
          HAGISCRIPT_INTEGRATION_SUMMARY_PATH: ${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/runtime-management-${{ matrix.platform }}-integration-summary.md
        run: node scripts/run-with-log.mjs "${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/runtime-management-${{ matrix.platform }}-integration.log" npm run integration:runtime-management

      - name: Append runtime-management summary
        if: always()
        shell: bash
        run: |
          echo "## Hagiscript runtime management (${{ matrix.label }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${HAGISCRIPT_CI_ARTIFACT_DIR}/runtime-management-${{ matrix.platform }}-integration-summary.md" ]; then
            cat "${HAGISCRIPT_CI_ARTIFACT_DIR}/runtime-management-${{ matrix.platform }}-integration-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Integration summary was not produced before the job ended." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload runtime-management diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hagiscript-runtime-management-${{ matrix.platform }}-diagnostics
          path: ${{ env.HAGISCRIPT_CI_ARTIFACT_DIR }}/
          if-no-files-found: warn
